name: Migrate DB (manual)

# Manual recovery path only.
# Automatic release migrations are handled by:
# - Run Migrations Staging
# - Run Migrations Production

on:
  workflow_dispatch:
    inputs:
      config:
        description: 'Doppler config to migrate against'
        type: choice
        options:
          - staging
          - production
        required: true
        default: 'staging'
      reason:
        description: 'Why are you manually running this?'
        required: true
        default: 'Apply pending migrations'

concurrency:
  group: migrate-manual-${{ inputs.config }}
  cancel-in-progress: false

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment: ${{ inputs.config }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.config }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Use repo-pinned npm
        run: |
          PINNED_NPM=$(node -p "require('./package.json').packageManager.split('@')[1]")
          npm install -g "npm@$PINNED_NPM"
          npm --version

      - name: Resolve Doppler config
        id: resolve
        run: |
          gh_env="${{ inputs.config }}"
          case "$gh_env" in
            production) config="prd" ;;
            staging)    config="stg" ;;
            *) echo "::error::Unknown env: $gh_env"; exit 1 ;;
          esac

          echo "gh_env=$gh_env"           >> "$GITHUB_OUTPUT"
          echo "config=$config"           >> "$GITHUB_OUTPUT"
          echo "GitHub Environment: $gh_env"
          echo "Doppler config:     $config"

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y postgresql-client > /dev/null

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Run manual migration gate
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
          DOPPLER_PROJECT: trustloop
          DOPPLER_CONFIG: ${{ steps.resolve.outputs.config }}
        run: |
          .github/scripts/run-prisma-migrations.sh

      - name: Summary
        if: always()
        run: |
          {
            echo "### Migration summary"
            echo ""
            echo "- Doppler config: \`${{ steps.resolve.outputs.config }}\`"
            echo "- Trigger: manual dispatch"
            echo "- Ref:     refs/heads/${{ inputs.config }}"
            echo "- Outcome: ${{ job.status }}"
            echo "- Reason:  ${{ inputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
