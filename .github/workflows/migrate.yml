name: Migrate DB

# One workflow, two environments. Doppler provides the env vars
# (DATABASE_URL, etc.) based on which config we point it at.
#
# Branch → GitHub Environment → Doppler config mapping:
#   successful CI on staging     →  github env `staging`     →  Doppler `stg`  →  staging Postgres
#   successful CI on production  →  github env `production`  →  Doppler `prd`  →  prod Postgres
#   workflow_dispatch            →  user-selected           →  mapped → corresponding DB
#
# Release model:
#   - Railway staging deploys must come from the `staging` branch.
#   - Railway production deploys must come from the `production` branch.
#   - Migrations run only after CI succeeds on that environment branch, so
#     deploy branches cannot bypass the normal validation gates.
#
# Prereq: each GitHub Environment (staging, production) must have a
# DOPPLER_TOKEN secret set to a Doppler Service Token scoped to the
# matching config. GitHub resolves `environment:` first and loads
# that env's secrets, so secrets.DOPPLER_TOKEN auto-selects correctly.
#
# Pairs with the Doppler↔Railway integration so Railway's DATABASE_URL
# flows into Doppler automatically.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [staging, production]
  workflow_dispatch:
    inputs:
      config:
        description: 'Doppler config to migrate against'
        type: choice
        options:
          - staging
          - production
        required: true
        default: 'staging'
      reason:
        description: 'Why are you manually running this?'
        required: true
        default: 'Apply pending migrations'

concurrency:
  # One migration per target config at a time. Same-config runs queue
  # up behind in-flight runs instead of cancelling them.
  group: migrate-${{ github.event_name == 'workflow_dispatch' && inputs.config || github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  migrate:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    # When the run targets production, GitHub's `environment: production`
    # gate kicks in IF the repo has that environment configured with
    # required reviewers. Harmless if the env isn't configured (runs
    # without approval). Set this up in repo Settings → Environments.
    environment: ${{ github.event_name == 'workflow_dispatch' && inputs.config || github.event.workflow_run.head_branch }}

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.config || github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Use repo-pinned npm
        run: |
          PINNED_NPM=$(node -p "require('./package.json').packageManager.split('@')[1]")
          npm install -g "npm@$PINNED_NPM"
          npm --version

      - name: Resolve Doppler config
        id: resolve
        run: |
          # The GitHub Environment name (staging|production) is already
          # resolved at job level. Here we translate to the Doppler
          # config name which is shorter (stg|prd).
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            gh_env="${{ inputs.config }}"
          else
            gh_env="${{ github.event.workflow_run.head_branch }}"
          fi

          case "$gh_env" in
            production) config="prd" ;;
            staging)    config="stg" ;;
            *) echo "::error::Unknown env: $gh_env"; exit 1 ;;
          esac

          echo "gh_env=$gh_env"           >> "$GITHUB_OUTPUT"
          echo "config=$config"           >> "$GITHUB_OUTPUT"
          echo "GitHub Environment: $gh_env"
          echo "Doppler config:     $config"

      - name: Verify DOPPLER_TOKEN is set
        run: |
          if [ -z "${{ secrets.DOPPLER_TOKEN }}" ]; then
            echo "::error::DOPPLER_TOKEN secret is not set. See PR #28 for setup steps."
            exit 1
          fi

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v3

      - name: Verify Doppler config access + mask DATABASE_URL host
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          url=$(doppler secrets get DATABASE_URL \
                  --project trustloop \
                  --config ${{ steps.resolve.outputs.config }} \
                  --plain 2>/dev/null || true)
          if [ -z "$url" ]; then
            echo "::error::DATABASE_URL not found in Doppler config '${{ steps.resolve.outputs.config }}'. Check the Doppler ↔ Railway integration."
            exit 1
          fi
          host=$(echo "$url" | sed -E 's|^postgresql://[^@]+@([^:/]+).*|\1|')
          echo "Doppler config:  ${{ steps.resolve.outputs.config }}"
          echo "Target DB host:  $host"

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Show pending migrations
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run \
            --project trustloop \
            --config ${{ steps.resolve.outputs.config }} \
            -- npx --workspace @shared/database prisma migrate status \
            || true
        # non-fatal: migrate status exits non-zero on drift.

      - name: Apply migrations
        # `migrate deploy` is the production-safe variant: only applies
        # committed migrations, never creates new ones, never runs
        # interactively, does not use a shadow DB.
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
        run: |
          doppler run \
            --project trustloop \
            --config ${{ steps.resolve.outputs.config }} \
            -- npm run db:migrate:deploy

      - name: Summary
        if: always()
        run: |
          {
            echo "### Migration summary"
            echo ""
            echo "- Doppler config: \`${{ steps.resolve.outputs.config }}\`"
            echo "- Trigger: ${{ github.event_name }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Ref:     refs/heads/${{ inputs.config }}"
              echo "- Commit:  manual dispatch"
            else
              echo "- Ref:     refs/heads/${{ github.event.workflow_run.head_branch }}"
              echo "- Commit:  ${{ github.event.workflow_run.head_sha }}"
              echo "- CI run:  ${{ github.event.workflow_run.html_url }}"
            fi
            echo "- Outcome: ${{ job.status }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Reason:  ${{ inputs.reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
