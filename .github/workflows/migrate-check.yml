name: Migrate check (drift)

# Read-only validation that runs on every PR touching the database package.
# Uses ephemeral Postgres databases and never touches staging or production.
#
# What this catches:
#   - schema files changed without a matching migration
#   - migrations that fail to apply cleanly from scratch
#   - destructive SQL without an explicit review marker
#   - raw SQL objects Prisma cannot model but production depends on

on:
  pull_request:
    paths:
      - 'packages/database/**'
      - '.github/workflows/migrate-check.yml'
      - '.github/scripts/check-migration-safety.sh'
      - '.github/scripts/test-check-migration-safety.sh'
  push:
    branches: [main, production]
    paths:
      - 'packages/database/**'
      - '.github/workflows/migrate-check.yml'
      - '.github/scripts/check-migration-safety.sh'
      - '.github/scripts/test-check-migration-safety.sh'

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    services:
      postgres:
        # pgvector image = Postgres 17 + the `vector` extension preinstalled.
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: trustloop_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop_test?schema=public

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Use repo-pinned npm
        run: |
          PINNED_NPM=$(node -p "require('./package.json').packageManager.split('@')[1]")
          npm install -g "npm@$PINNED_NPM"
          npm --version

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update -y > /dev/null
          sudo apt-get install -y postgresql-client > /dev/null

      - run: npm install --no-audit --no-fund

      - name: Self-test migration safety scanner
        run: .github/scripts/test-check-migration-safety.sh

      - name: Scan changed migrations for unsafe SQL
        env:
          MIGRATION_SAFETY_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: .github/scripts/check-migration-safety.sh

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Apply all migrations to ephemeral Postgres
        # `migrate deploy` is production-safe: committed migrations only,
        # no prompts, no shadow DB.
        run: npm run db:migrate:deploy

      - name: Assert raw SQL objects Prisma cannot model
        # Prisma cannot model the pgvector HNSW index. Verify it exists with
        # the expected method/opclass before dropping it for Prisma's diff.
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -U postgres -d trustloop_test \
            -v ON_ERROR_STOP=1 <<'SQL'
          DO $$
          DECLARE
            index_method text;
            opclass_name text;
          BEGIN
            SELECT am.amname, opc.opcname
              INTO index_method, opclass_name
              FROM pg_class index_class
              JOIN pg_index index_info ON index_info.indexrelid = index_class.oid
              JOIN pg_am am ON am.oid = index_class.relam
              JOIN pg_opclass opc ON opc.oid = index_info.indclass[0]
             WHERE index_class.relname = 'RepositoryIndexChunk_embedding_idx';

            IF index_method IS DISTINCT FROM 'hnsw'
              OR opclass_name IS DISTINCT FROM 'vector_cosine_ops' THEN
              RAISE EXCEPTION
                'RepositoryIndexChunk_embedding_idx mismatch. method=%, opclass=%',
                index_method,
                opclass_name;
            END IF;
          END $$;
          SQL

      - name: Drop HNSW index for drift check
        # Prisma 7's schema language cannot express `USING hnsw`. The
        # RepositoryIndexChunk_embedding_idx lives only in raw SQL. To let
        # migrate diff see a clean baseline, drop it in the ephemeral DB.
        run: |
          PGPASSWORD=postgres psql \
            -h localhost -U postgres -d trustloop_test \
            -c 'DROP INDEX IF EXISTS "RepositoryIndexChunk_embedding_idx";'

      - name: Check post-migration status
        run: npm --workspace @shared/database exec -- prisma migrate status

      - name: Detect schema drift
        # Compares the live just-migrated DB against committed schema files.
        working-directory: packages/database
        run: |
          npx prisma migrate diff \
            --from-config-datasource \
            --to-schema ./prisma/schema \
            --exit-code

      - name: Summary
        if: always()
        run: |
          {
            echo "### Migration drift check"
            echo ""
            echo "- Ephemeral DB: postgres:17 + pgvector"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Outcome: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"
