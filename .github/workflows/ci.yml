name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: test
      SESSION_COOKIE_NAME: trustloop-session
      SESSION_TTL_HOURS: "24"
      SESSION_SECRET: ci-test-secret-minimum-16
      API_KEY_PEPPER: ci-test-pepper-minimum-16
      SLACK_SIGNING_SECRET: ci-test-slack-signing-secret
      TEMPORAL_ADDRESS: localhost:7233
      TEMPORAL_NAMESPACE: default
      INTERNAL_SERVICE_KEY: tli_ci_test_service_key_12345
      COREPACK_ENABLE_STRICT: "0"
      COREPACK_ENABLE_AUTO_PIN: "0"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Use repo-pinned npm
        run: |
          PINNED_NPM=$(node -p "require('./package.json').packageManager.split('@')[1]")
          npm install -g "npm@$PINNED_NPM"
          npm --version

      - name: Enable turbo remote cache (GitHub Actions cache backend)
        uses: dtinth/setup-github-actions-caching-for-turbo@v1

      - name: Determine turbo filter base
        id: turbo-base
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "ref=origin/${{ github.base_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=HEAD^1" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove yarn to prevent Corepack/SWC registry conflict
        run: |
          corepack disable || true
          npm rm -g yarn 2>/dev/null || true
          rm -f "$(which yarn 2>/dev/null)" "$(which yarnpkg 2>/dev/null)" 2>/dev/null || true

      - run: npm install
      - name: Install platform-specific native binaries for Linux CI
        run: |
          npm install --no-save --package-lock=false \
            @tailwindcss/oxide-linux-x64-gnu \
            @next/swc-linux-x64-gnu \
            @node-rs/argon2-linux-x64-gnu \
            @img/sharp-linux-x64 \
            lightningcss-linux-x64-gnu \
            || true

      # Global guards — always run, cheap, protect committed artifacts.
      - run: npm run db:generate
      - run: git diff --exit-code
      - run: npm run openapi:check

      # Scoped validation — only workspaces changed since base ref + their dependents.
      # `[ref]` matches changed packages; trailing `...` pulls in everything that depends on them.
      - name: Validate affected workspaces
        run: npx turbo run type-check lint test build --filter="[${{ steps.turbo-base.outputs.ref }}]..."
        env:
          SKIP_ENV_VALIDATION: "1"

  # Detect which services have changed inputs. Emits a dynamic matrix the
  # docker-build job expands into parallel per-service jobs. Mirrors the
  # watchPatterns in deploy/railway.*.json so CI matches Railway's rebuild
  # triggers — no drift between them.
  detect-changes:
    runs-on: ubuntu-latest
    needs: validate
    permissions:
      contents: read
      pull-requests: read
    outputs:
      services: ${{ steps.set-matrix.outputs.services }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            marketing:
              - 'apps/marketing/**'
              - 'packages/brand/**'
              - 'deploy/marketing.Dockerfile'
              - 'deploy/railway.marketing.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            web:
              - 'apps/web/**'
              - 'packages/brand/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/rest/**'
              - 'packages/types/**'
              - 'deploy/web.Dockerfile'
              - 'deploy/railway.web.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            queue:
              - 'apps/queue/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/rest/**'
              - 'packages/types/**'
              - 'deploy/queue.Dockerfile'
              - 'deploy/railway.queue.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'
            agents:
              - 'apps/agents/**'
              - 'packages/database/**'
              - 'packages/env/**'
              - 'packages/types/**'
              - 'deploy/agents.Dockerfile'
              - 'deploy/railway.agents.json'
              - 'package.json'
              - 'package-lock.json'
              - '.dockerignore'

      - name: Build matrix from changed services
        id: set-matrix
        run: |
          services=()
          [[ "${{ steps.changes.outputs.marketing }}" == "true" ]] && services+=('"marketing"')
          [[ "${{ steps.changes.outputs.web }}"       == "true" ]] && services+=('"web"')
          [[ "${{ steps.changes.outputs.queue }}"     == "true" ]] && services+=('"queue"')
          [[ "${{ steps.changes.outputs.agents }}"    == "true" ]] && services+=('"agents"')
          if [ ${#services[@]} -eq 0 ]; then
            matrix='[]'
          else
            IFS=,
            matrix="[${services[*]}]"
          fi
          echo "services=$matrix" >> "$GITHUB_OUTPUT"
          echo "Matrix: $matrix"
          {
            echo "### Changed services"
            echo ""
            echo "| Service | Changed |"
            echo "|---------|---------|"
            echo "| marketing | ${{ steps.changes.outputs.marketing == 'true' && '✅' || '⏭️' }} |"
            echo "| web       | ${{ steps.changes.outputs.web       == 'true' && '✅' || '⏭️' }} |"
            echo "| queue     | ${{ steps.changes.outputs.queue     == 'true' && '✅' || '⏭️' }} |"
            echo "| agents    | ${{ steps.changes.outputs.agents    == 'true' && '✅' || '⏭️' }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  # One parallel job per changed service. Uses GHA layer cache scoped per
  # service so changes to one service don't invalidate the others' cache.
  docker-build:
    needs: detect-changes
    if: needs.detect-changes.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-changes.outputs.services) }}
    name: docker-build (${{ matrix.service }})
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.service }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/${{ matrix.service }}.Dockerfile
          push: false
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          tags: trustloop-${{ matrix.service }}:ci
