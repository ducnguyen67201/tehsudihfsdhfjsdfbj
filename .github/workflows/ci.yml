name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/trustloop?schema=public
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: test
      SESSION_COOKIE_NAME: trustloop-session
      SESSION_TTL_HOURS: "24"
      SESSION_SECRET: ci-test-secret-minimum-16
      API_KEY_PEPPER: ci-test-pepper-minimum-16
      SLACK_SIGNING_SECRET: ci-test-slack-signing-secret
      TEMPORAL_ADDRESS: localhost:7233
      TEMPORAL_NAMESPACE: default
      TEMPORAL_TASK_QUEUE: support-general
      CODEX_TASK_QUEUE: codex-intensive
      INTERNAL_SERVICE_KEY: tli_ci_test_service_key_12345
      COREPACK_ENABLE_STRICT: "0"
      COREPACK_ENABLE_AUTO_PIN: "0"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Remove yarn to prevent Corepack/SWC registry conflict
        run: |
          corepack disable || true
          npm rm -g yarn 2>/dev/null || true
          rm -f "$(which yarn 2>/dev/null)" "$(which yarnpkg 2>/dev/null)" 2>/dev/null || true

      - run: npm install
      - name: Install platform-specific native binaries for Linux CI
        run: npm install --no-save @tailwindcss/oxide-linux-x64-gnu @next/swc-linux-x64-gnu || true
      - run: npm run db:generate
      - run: git diff --exit-code
      - run: npm run openapi:check
      - run: npm run type-check
      - run: npm run lint
      - run: npm run test
      - run: npm run build
