name: Migrate staging DB

# Runs prisma migrate deploy against the staging database when:
#   - migration files or schema change on main (auto-trigger)
#   - a human triggers the workflow manually (safety net)
#
# Prereq: STAGING_DATABASE_URL secret must be set in repo settings.
# The URL should be the Railway Postgres TCP Proxy (public) URL, not
# the internal railway.internal hostname — GHA runners can't reach the
# Railway private network.
#
# Production migrations use a separate manual workflow (migrate-production.yml)
# or Railway's preDeployCommand — intentionally more friction for prod.

on:
  push:
    branches: [main]
    paths:
      - 'packages/database/prisma/migrations/**'
      - 'packages/database/prisma/schema.prisma'
      - 'packages/database/prisma/schema/**'
      - '.github/workflows/migrate-staging.yml'
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why are you manually running this?'
        required: true
        default: 'Apply pending staging migrations'

concurrency:
  # Only one staging migration runs at a time. New pushes cancel in-flight runs.
  group: migrate-staging
  cancel-in-progress: false  # don't cancel — wait for current to finish

jobs:
  migrate:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify secret is set
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::STAGING_DATABASE_URL secret is not set. Add it in repo Settings → Secrets → Actions."
            exit 1
          fi
          # print the host only, never the password
          host=$(echo "$DATABASE_URL" | sed -E 's|^postgresql://[^@]+@([^:/]+).*|\1|')
          echo "Target host: $host"

      - name: Install deps (minimal — just the database workspace)
        run: npm install --no-audit --no-fund

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Show pending migrations
        run: |
          npx --workspace @shared/database prisma migrate status || true
        # non-fatal: `migrate status` exits non-zero when drift detected.
        # We log it for visibility, then let `migrate deploy` decide.

      - name: Apply migrations
        run: npm run db:migrate

      - name: Summary
        if: always()
        run: |
          {
            echo "### Staging migration"
            echo ""
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Commit:  ${{ github.sha }}"
            echo "- Outcome: ${{ job.status }}"
            if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
              echo "- Reason:  ${{ inputs.reason }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
